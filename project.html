document.getElementById('proj-subtitle').textContent = d.subtitle;

const textEl = document.getElementById('proj-text');
textEl.innerHTML = "";

d.text.forEach(t => {
  const p = document.createElement('p');
  p.textContent = t;
  textEl.appendChild(p);
});

const MEDIA_PER_PAGE = 4;
let cur = 0;
let page = 0;

const mainMedia = document.getElementById('main-media');
const thumbsEl = document.getElementById('thumbs');

const pages = getPages(d.media);

function renderThumbs() {
  thumbsEl.innerHTML = "";

  pages[page].forEach((item, i) => {
    const index = page * MEDIA_PER_PAGE + i;

    const el = document.createElement('div');
    el.className = "thumb-item";

    if (item.type === "image") {
      const img = document.createElement('img');
      img.src = item.src;
      el.appendChild(img);
    } else {
      const video = document.createElement('video');
      video.src = item.src;
      video.muted = true;
      video.playsInline = true;
      el.appendChild(video);
    }

    el.onclick = () => setMedia(index);

    if (index === cur) el.classList.add('active');

    thumbsEl.appendChild(el);
  });
}

function setMedia(i) {
  cur = (i + d.media.length) % d.media.length;
  page = Math.floor(cur / MEDIA_PER_PAGE);

  const item = d.media[cur];

  mainMedia.innerHTML = "";

  if (item.type === "image") {
    const img = document.createElement('img');
    img.src = item.src;
    mainMedia.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = item.src;
    video.controls = true;
    video.autoplay = true;
    video.playsInline = true;
    mainMedia.appendChild(video);
  }

  renderThumbs();
}

function getPages(arr) {
  const pages = [];
  for (let i = 0; i < arr.length; i += MEDIA_PER_PAGE) {
    pages.push(arr.slice(i, i + MEDIA_PER_PAGE));
  }
  return pages;
}

document.getElementById('prev').onclick = () => {
  setMedia(cur - 1);
};

document.getElementById('next').onclick = () => {
  setMedia(cur + 1);
};

setMedia(0);
const lightbox = document.getElementById('lightbox');
const lbMedia = document.getElementById('lightbox-media');

// відкриття по кліку на головне медіа
mainMedia.onclick = () => {
  openLightbox();
};

function openLightbox() {
  lightbox.classList.add('active');
  renderLightboxMedia();
}

function closeLightbox() {
  lightbox.classList.remove('active');
  lbMedia.innerHTML = "";
}

function renderLightboxMedia() {
  const item = d.media[cur];

  lbMedia.innerHTML = "";

  if (item.type === "image") {
    const img = document.createElement('img');
    img.src = item.src;
    lbMedia.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = item.src;
    video.controls = true;
    video.autoplay = true;
    lbMedia.appendChild(video);
  }
}

// кнопки
document.getElementById('lb-prev').onclick = () => {
  setMedia(cur - 1);
  renderLightboxMedia();
};

document.getElementById('lb-next').onclick = () => {
  setMedia(cur + 1);
  renderLightboxMedia();
};

// закриття
document.getElementById('lb-close').onclick = closeLightbox;

// клік по фону
lightbox.onclick = (e) => {
  if (e.target === lightbox) closeLightbox();
};

// ESC
document.addEventListener('keydown', (e) => {
  if (e.key === "Escape") closeLightbox();
});
const video = document.createElement('video');
video.src = item.src;
video.controls = true;
video.autoplay = true;
video.playsInline = true;
video.style.maxHeight = "100%";
video.style.maxWidth = "100%";
