const project = new URLSearchParams(location.search).get('project') || 'house61';
const d = DATA[project] || DATA.house61;

document.title = 'pro DIM — ' + d.title;

// TABLE (без змін)
function buildTable(){
  const wrap=document.createElement('div'); wrap.style.overflowX='auto'; wrap.style.marginBottom='32px';
  const t=document.createElement('table'); t.className='spec-table';
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  d.table.headers.forEach(h=>{ const th=document.createElement('th'); th.textContent=h; hr.appendChild(th); });
  thead.appendChild(hr); t.appendChild(thead);
  const tbody=document.createElement('tbody');
  d.table.rows.forEach(row=>{
    const tr=document.createElement('tr');
    const td0=document.createElement('td');
    td0.innerHTML=`<strong>${row.name}</strong>${row.desc?'<br><span class="note">'+row.desc+'</span>':''}`;
    tr.appendChild(td0);
    row.vals.forEach(v=>{
      const td=document.createElement('td');
      if(row.price){ td.textContent=v; }
      else { td.innerHTML=v==='+'?'<span class="plus">+</span>':v==='−'?'<span class="minus">−</span>':v; }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  t.appendChild(tbody); wrap.appendChild(t); return wrap;
}

// TEXT
function buildExtra(){
  const div=document.createElement('div'); div.className='extra';
  d.extraText.forEach(item=>{
    if(item.type==='h3'){const h=document.createElement('h3');h.textContent=item.text;div.appendChild(h);}
    else if(item.type==='ul'){
      const ul=document.createElement('ul');
      item.items.forEach(li=>{const l=document.createElement('li');l.textContent=li;ul.appendChild(l);});
      div.appendChild(ul);
    }
  });
  return div;
}

// ASSEMBLE
const main=document.getElementById('main-content');

// title
const h1=document.createElement('h1');
h1.innerHTML=`${d.title}<small>${d.subtitle}</small>`;
main.appendChild(h1);

const img=document.createElement('img');
img.src=d.media[0];
img.alt=d.title;
img.className='single-img';

main.appendChild(img);

// table
main.appendChild(buildTable());

// text
main.appendChild(buildExtra());

// extra image (як було)
if(d.extraImg){
  const img=document.createElement('img');
  img.src=d.extraImg;
  img.className='extra-img';
  main.appendChild(img);
}

// notice
const notice=document.createElement('div'); notice.className='notice';
d.notice.forEach(n=>{
  const p=document.createElement('p');
  p.innerHTML=n;
  notice.appendChild(p);
});
main.appendChild(notice);

// thanks
if(d.thanks){
  const t=document.createElement('p');
  t.className='thanks';
  t.style.whiteSpace='pre-line';
  t.textContent=d.thanks;
  main.appendChild(t);
}
